<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Viv 七年大计账户仪表盘</title>
  <style>
    :root{--bg:#0f1117;--card:#171a23;--card2:#202638;--text:#f4f6fb;--muted:#a6adbb;--line:#303746;--green:#3ddc84;--red:#ff5b6e;--yellow:#ffd166;--blue:#8ab4ff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.45}header{position:sticky;top:0;z-index:5;background:rgba(15,17,23,.96);border-bottom:1px solid var(--line);padding:14px 16px;backdrop-filter:blur(10px)}h1{font-size:20px;margin:0 0 6px}.sub{font-size:13px;color:var(--muted)}main{max-width:1180px;margin:0 auto;padding:16px;display:grid;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 28px rgba(0,0,0,.18)}h2{font-size:16px;margin:0 0 12px}.grid{display:grid;gap:12px}.top{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.core{background:linear-gradient(180deg,#202638,#171a23);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:88px}.core .k{font-size:12px;color:var(--muted);margin-bottom:7px}.core .v{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}.core .hint{font-size:12px;color:var(--muted);margin-top:5px}.status{border-color:rgba(138,180,255,.58);background:linear-gradient(135deg,rgba(34,86,214,.18),rgba(31,36,48,.96))}.status.warn{border-color:rgba(255,209,102,.78);background:linear-gradient(135deg,rgba(255,209,102,.16),rgba(31,36,48,.96))}.status.danger{border-color:rgba(255,91,110,.78);background:linear-gradient(135deg,rgba(255,91,110,.16),rgba(31,36,48,.96))}#executionStatus{font-size:20px;font-weight:850}.fields{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.fields.two{grid-template-columns:repeat(2,minmax(0,1fr))}label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}input{width:100%;padding:10px 9px;border-radius:10px;border:1px solid var(--line);background:#0c0e14;color:var(--text);font-size:15px}input:focus{outline:1px solid var(--blue)}button{border:1px solid var(--line);background:var(--card2);color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px}button.primary{background:#2256d6;border-color:#2256d6}button.warn{background:#5b2430;border-color:#7f2d3b}.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.metric{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}.metric:last-child{border-bottom:0}.metric .k{color:var(--muted)}.metric .v{text-align:right;font-variant-numeric:tabular-nums}.pos{color:var(--green)}.neg{color:var(--red)}.yellow{color:var(--yellow)}details.card>summary{cursor:pointer;font-size:16px;font-weight:800;margin:-2px 0 12px}.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}th:first-child,td:first-child{text-align:left}th{color:var(--muted);font-weight:600}textarea{width:100%;min-height:260px;resize:vertical;border-radius:12px;border:1px solid var(--line);background:#0c0e14;color:var(--text);padding:12px;font-size:13px;line-height:1.5}.risk{margin:0;padding-left:18px}.risk li{margin:7px 0}.small{font-size:12px;color:var(--muted)}.mobile-actions{position:fixed;left:0;right:0;bottom:0;z-index:20;display:none;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(15,17,23,.96);border-top:1px solid var(--line);backdrop-filter:blur(10px)}
    @media (max-width:760px){body{font-size:16px}main{padding:12px 12px 96px}.top{grid-template-columns:1fr}.core{min-height:auto}.core .v{font-size:20px}.fields,.fields.two{grid-template-columns:1fr}.card{padding:14px}input{min-height:46px;font-size:16px}button{min-height:44px;font-size:15px}.mobile-actions{display:grid}.mobile-actions button{min-height:48px;font-weight:800}}
    @media (min-width:900px){.grid.two{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<header>
  <h1>Viv 七年大计账户仪表盘</h1>
  <div class="sub">V2.3 自动读取版：打开网页会自动读取本机保存数据。数据只保存在当前浏览器。</div>
</header>
<main>
  <section class="card"><h2>今日核心看板</h2><div id="coreDashboard" class="top"></div></section>
  <section class="card status" id="statusCard"><h2>执行状态</h2><div id="executionStatus">请先填写账户数据，或点击读取本机保存</div></section>
  <section class="card"><h2>风控提示</h2><ul class="risk" id="riskList"></ul></section>

  <section class="card">
    <h2>每日输入</h2>
    <div class="fields">
      <div><label>日期</label><input id="date" value="" placeholder="例如 2026-06-20"></div>
      <div><label>美元兑人民币</label><input id="usd_cny" type="number" step="0.0001" value="6.78" inputmode="decimal"></div>
      <div><label>美股真实累计投入 USD</label><input id="total_deposit" type="number" step="0.01" value="" placeholder="请填写" inputmode="decimal"></div>
    </div>

    <details class="card" open><summary>① 美股账户输入</summary>
      <div class="fields">
        <div><label>Net Liq / 净清算价值</label><input id="net_liq" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>Long Stock Value / 股票市值</label><input id="long_stock_value" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>Margin Balance / 融资余额</label><input id="margin_balance" type="number" step="0.01" placeholder="负数代表融资" inputmode="decimal"></div>
        <div><label>Available Funds / 可用资金</label><input id="available_funds" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>Maintenance Requirement / 维持保证金</label><input id="maintenance_requirement" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>P/L Day / 当日盈亏</label><input id="pl_day" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>P/L Open / 持仓盈亏</label><input id="pl_open" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>P/L YTD / 年内盈亏</label><input id="pl_ytd" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
      </div>
    </details>

    <details class="card"><summary>② 美股持仓输入</summary>
      <div class="table-scroll"><table id="posInputs"><thead><tr><th>ticker</th><th>股数</th><th>成本</th><th>当前价</th></tr></thead><tbody>
        <tr><td><input data-pos="ticker" value="DRAM"></td><td><input data-pos="quantity" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td><td><input data-pos="avg_cost" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td><td><input data-pos="current_price" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td></tr>
        <tr><td><input data-pos="ticker" value="AMD"></td><td><input data-pos="quantity" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td><td><input data-pos="avg_cost" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td><td><input data-pos="current_price" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td></tr>
        <tr><td><input data-pos="ticker" value="MRVL"></td><td><input data-pos="quantity" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td><td><input data-pos="avg_cost" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td><td><input data-pos="current_price" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></td></tr>
      </tbody></table></div>
    </details>

    <details class="card"><summary>③ A股七年仓输入</summary>
      <div class="fields">
        <div><label>总资产</label><input id="total_assets" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>总市值</label><input id="total_market_value" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>净资产</label><input id="net_assets" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>总负债/融资</label><input id="total_debt" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>可用保证金</label><input id="available_margin" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>维持担保比例 %</label><input id="maintenance_ratio" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>总盈亏</label><input id="total_pnl" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>当日参考盈亏</label><input id="day_pnl" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
        <div><label>历史高点盈利</label><input id="profit_high" type="number" step="0.01" placeholder="请填写" inputmode="decimal"></div>
      </div>
    </details>

    <div class="btns">
      <button class="primary" onclick="calculate()">重新计算</button>
      <button onclick="saveLocal()">保存到本机</button>
      <button onclick="loadLocal(true)">读取本机保存</button>
      <button onclick="copyReport()">复制Markdown日报</button>
      <button onclick="downloadCsv()">下载dashboard.csv</button>
      <button class="warn" onclick="resetDefaults()">清空本机数据</button>
    </div>
  </section>

  <section class="grid two"><div class="card"><h2>美股账户</h2><div id="usMetrics"></div></div><div class="card"><h2>A股七年仓 / 合并账户</h2><div id="ashareMetrics"></div></div></section>
  <details class="card"><summary>④ 计算结果明细</summary><h2>美股持仓明细</h2><div class="table-scroll"><table id="posTable"></table></div></details>
  <details class="card"><summary>⑤ Markdown日报</summary><textarea id="report" readonly></textarea><div class="small">复制后直接发给 GPT。</div></details>
</main>
<div class="mobile-actions"><button class="primary" onclick="calculate()">重新计算</button><button onclick="saveLocal()">保存</button><button onclick="copyReport()">复制日报</button></div>
<script>
const ids=["date","usd_cny","total_deposit","net_liq","long_stock_value","margin_balance","available_funds","maintenance_requirement","pl_day","pl_open","pl_ytd","total_assets","total_market_value","net_assets","total_debt","available_margin","maintenance_ratio","total_pnl","day_pnl","profit_high"];
function num(id){return Number(document.getElementById(id).value||0)}function val(id){return document.getElementById(id).value}function money(n,c="$"){return c+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}function rmb(n){return "¥"+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}function pct(n){return (Number(n)*100).toFixed(2)+"%"}function cls(n){return Number(n)>=0?"pos":"neg"}
function hasData(){return ids.filter(id=>!["date","usd_cny"].includes(id)).some(id=>document.getElementById(id).value.trim()!=="")||[...document.querySelectorAll('#posInputs input[data-pos]:not([data-pos="ticker"])')].some(i=>i.value.trim()!=="")}
function getPositions(){return [...document.querySelectorAll("#posInputs tbody tr")].map(tr=>{const o={};tr.querySelectorAll("input").forEach(i=>o[i.dataset.pos]=i.value);return{ticker:(o.ticker||"").trim(),quantity:Number(o.quantity||0),avg_cost:Number(o.avg_cost||0),current_price:Number(o.current_price||0)}}).filter(p=>p.ticker)}
function metric(k,v,klass=""){return `<div class="metric"><span class="k">${k}</span><span class="v ${klass}">${v}</span></div>`}function core(k,v,klass="",hint=""){return `<div class="core"><div class="k">${k}</div><div class="v ${klass}">${v}</div>${hint?`<div class="hint">${hint}</div>`:""}</div>`}function targetText(gap){return gap>0?`差 ${rmb(gap)}`:`已超过 ${rmb(Math.abs(gap))}`}
function decision(totalPnl,aDebtRate){const t=[];if(aDebtRate>.25)t.push({level:70,tone:"danger",text:"七年仓融资高压：不加融资，优先等修复后降融资"});if(totalPnl>=630000)t.push({level:100,tone:"danger",text:"接近历史高点：必须降融资到40–50万"});else if(totalPnl>=580000)t.push({level:80,tone:"warn",text:"触发降融资观察线：考虑还融资10–15万"});if(totalPnl<300000)t.push({level:100,tone:"danger",text:"必须降风险/降融资"});else if(totalPnl<350000)t.push({level:90,tone:"danger",text:"考虑降beta/部分从纳指科技切回宽基纳指"});else if(totalPnl<400000)t.push({level:60,tone:"warn",text:"不加仓，只观察"});return t.length?t.sort((a,b)=>b.level-a.level)[0]:{tone:"",text:"今日状态：可持有，不加仓，不补救交易"}}
function calculate(){if(!hasData()){const m="请先填写账户数据，或点击读取本机保存";document.getElementById("coreDashboard").innerHTML=core("等待账户数据",m,"yellow","网页源码不保存真实账户数据");document.getElementById("executionStatus").textContent=m;document.getElementById("statusCard").className="card status warn";document.getElementById("riskList").innerHTML=`<li>${m}</li>`;document.getElementById("usMetrics").innerHTML=metric("美股账户",m,"yellow");document.getElementById("ashareMetrics").innerHTML=metric("A股七年仓 / 合并账户",m,"yellow");document.getElementById("posTable").innerHTML="";document.getElementById("report").value=m;return}
const usd=num("usd_cny"),deposit=num("total_deposit"),net=num("net_liq"),longv=num("long_stock_value"),margin=num("margin_balance"),plYtd=num("pl_ytd"),plOpen=num("pl_open"),plDay=num("pl_day");const realProfit=net-deposit,realReturn=deposit?realProfit/deposit:0,ytdReturn=deposit?plYtd/deposit:0,stockExposure=net?longv/net:0,marginRate=net&&margin<0?Math.abs(margin)/net:0;const positions=getPositions().map(p=>{const market=p.quantity*p.current_price,cost=p.quantity*p.avg_cost,pnl=market-cost,ret=cost?pnl/cost:0,weight=longv?market/longv:0;return{...p,market,pnl,ret,weight}});const totalMarket=num("total_market_value"),netAssets=num("net_assets"),debt=num("total_debt"),totalPnl=num("total_pnl"),profitHigh=num("profit_high"),aExposure=netAssets?totalMarket/netAssets:0,aDebtRate=netAssets?debt/netAssets:0,gapHigh=profitHigh-totalPnl,usProfitRmb=realProfit*usd,combined=totalPnl+usProfitRmb,gap1m=1000000-combined,d=decision(totalPnl,aDebtRate);
document.getElementById("coreDashboard").innerHTML=[core("合并总盈利",rmb(combined),cls(combined)),core("距离100万人民币目标",targetText(gap1m),gap1m>0?"yellow":"pos"),core("美股YTD收益率",pct(ytdReturn),cls(ytdReturn)),core("美股融资率",pct(marginRate),marginRate<.05?"pos":"yellow",marginRate<.05?"安全":"注意"),core("七年仓融资率",pct(aDebtRate),aDebtRate>.25?"yellow":"",aDebtRate>.25?"高压":"")].join("");document.getElementById("executionStatus").textContent=d.text;document.getElementById("statusCard").className=`card status ${d.tone}`;
document.getElementById("usMetrics").innerHTML=[metric("Net Liq",money(net)),metric("真实累计投入",money(deposit)),metric("真实累计盈利",money(realProfit),cls(realProfit)),metric("真实累计收益率",pct(realReturn),cls(realReturn)),metric("P/L YTD",money(plYtd),cls(plYtd)),metric("YTD收益率",pct(ytdReturn),cls(ytdReturn)),metric("P/L Open",money(plOpen),cls(plOpen)),metric("P/L Day",money(plDay),cls(plDay)),metric("股票仓位",pct(stockExposure),stockExposure>1.2?"yellow":""),metric("融资率",pct(marginRate),marginRate>.05?"yellow":""),metric("Available Funds",money(num("available_funds")))].join("");
document.getElementById("ashareMetrics").innerHTML=[metric("七年仓总盈亏",rmb(totalPnl),cls(totalPnl)),metric("七年仓仓位",pct(aExposure),aExposure>1.2?"yellow":""),metric("七年仓融资率",pct(aDebtRate),aDebtRate>.25?"yellow":""),metric("距离历史高点盈利差额",rmb(gapHigh),gapHigh>0?"yellow":"pos"),metric("美股累计盈利折人民币",rmb(usProfitRmb),cls(usProfitRmb)),metric("合并总盈利",rmb(combined),cls(combined)),metric("距离100万人民币目标",rmb(gap1m),gap1m>0?"yellow":"pos")].join("");
document.getElementById("posTable").innerHTML=`<thead><tr><th>Ticker</th><th>数量</th><th>成本</th><th>现价</th><th>市值</th><th>浮盈</th><th>收益率</th><th>仓位</th></tr></thead><tbody>`+positions.map(p=>`<tr><td>${p.ticker}</td><td>${p.quantity.toFixed(2)}</td><td>${money(p.avg_cost)}</td><td>${money(p.current_price)}</td><td>${money(p.market)}</td><td class="${cls(p.pnl)}">${money(p.pnl)}</td><td class="${cls(p.ret)}">${pct(p.ret)}</td><td>${pct(p.weight)}</td></tr>`).join("")+`</tbody>`;
const risks=[];if(marginRate<.05)risks.push("美股融资安全：融资率低于5%。");if(stockExposure>1.2)risks.push("美股股票仓位偏高：超过120%。");if(aDebtRate>.25)risks.push("七年仓融资高压：融资率超过25%，不再加融资。");if(totalPnl>=630000)risks.push("七年仓接近历史高点：必须降融资，目标降到40–50万。");else if(totalPnl>=580000)risks.push("七年仓达到58–60万区间：开始考虑还融资10–15万。");if(totalPnl<300000)risks.push("七年仓总盈亏低于30万：必须降风险/降融资。");else if(totalPnl<350000)risks.push("七年仓总盈亏低于35万：考虑降beta/部分从纳指科技切回宽基纳指。");else if(totalPnl<400000)risks.push("七年仓总盈亏低于40万：不加仓，只观察。");if(!risks.length)risks.push("未触发额外风控线。核心原则：不加融资，不补救型交易，不卖核心信仰仓。");document.getElementById("riskList").innerHTML=risks.map(r=>`<li>${r}</li>`).join("");document.getElementById("report").value=makeReport({positions,realProfit,realReturn,ytdReturn,stockExposure,marginRate,aExposure,aDebtRate,gapHigh,usProfitRmb,combined,gap1m,risks});}
function makeReport(x){const lines=[];lines.push(`# Daily Account Dashboard - ${val("date")}`);lines.push("");lines.push("## 美股账户");lines.push(`- Net Liq：${money(num("net_liq"))}`);lines.push(`- Long Stock Value：${money(num("long_stock_value"))}`);lines.push(`- Margin Balance：${money(num("margin_balance"))}`);lines.push(`- P/L Day：${money(num("pl_day"))}`);lines.push(`- P/L Open：${money(num("pl_open"))}`);lines.push(`- P/L YTD：${money(num("pl_ytd"))}`);lines.push(`- 真实累计投入：${money(num("total_deposit"))}`);lines.push(`- 真实累计盈利：${money(x.realProfit)}`);lines.push(`- 真实累计收益率：${pct(x.realReturn)}`);lines.push(`- YTD收益率：${pct(x.ytdReturn)}`);lines.push(`- 股票仓位：${pct(x.stockExposure)}`);lines.push(`- 融资率：${pct(x.marginRate)}`);lines.push("");lines.push("## 美股持仓");lines.push("| Ticker | 数量 | 成本 | 现价 | 市值 | 浮盈 | 收益率 | 仓位 |");lines.push("|---|---:|---:|---:|---:|---:|---:|---:|");x.positions.forEach(p=>lines.push(`| ${p.ticker} | ${p.quantity.toFixed(2)} | ${money(p.avg_cost)} | ${money(p.current_price)} | ${money(p.market)} | ${money(p.pnl)} | ${pct(p.ret)} | ${pct(p.weight)} |`));lines.push("");lines.push("## A股七年仓");lines.push(`- 总资产：${rmb(num("total_assets"))}`);lines.push(`- 总市值：${rmb(num("total_market_value"))}`);lines.push(`- 净资产：${rmb(num("net_assets"))}`);lines.push(`- 总负债/融资：${rmb(num("total_debt"))}`);lines.push(`- 总盈亏：${rmb(num("total_pnl"))}`);lines.push(`- 当日参考盈亏：${rmb(num("day_pnl"))}`);lines.push(`- 仓位：${pct(x.aExposure)}`);lines.push(`- 融资率：${pct(x.aDebtRate)}`);lines.push(`- 距离历史高点盈利差额：${rmb(x.gapHigh)}`);lines.push("");lines.push("## 合并账户");lines.push(`- 美股累计盈利折人民币：${rmb(x.usProfitRmb)}`);lines.push(`- 合并总盈利：${rmb(x.combined)}`);lines.push(`- 距离100万人民币目标：${rmb(x.gap1m)}`);lines.push("");lines.push("## 风控提示");x.risks.forEach(r=>lines.push(`- ${r}`));return lines.join("\n")}
function state(){return{ids:Object.fromEntries(ids.map(id=>[id,document.getElementById(id).value])),positions:getPositions()}}
function applyState(s){Object.entries(s.ids||{}).forEach(([id,v])=>{if(document.getElementById(id))document.getElementById(id).value=v});if(s.positions){document.querySelectorAll("#posInputs tbody tr").forEach((tr,idx)=>{const p=s.positions[idx];if(!p)return;tr.querySelector('[data-pos="ticker"]').value=p.ticker;tr.querySelector('[data-pos="quantity"]').value=p.quantity;tr.querySelector('[data-pos="avg_cost"]').value=p.avg_cost;tr.querySelector('[data-pos="current_price"]').value=p.current_price})}calculate()}
function saveLocal(){localStorage.setItem("vivDashboardState",JSON.stringify(state()));alert("已保存到本机浏览器；下次打开会自动读取")}
function loadLocal(showAlert=false){const raw=localStorage.getItem("vivDashboardState");if(!raw)return alert("本机还没有保存数据");try{applyState(JSON.parse(raw));if(showAlert)alert("已读取本机保存数据")}catch(e){alert("读取失败：本机保存数据格式异常")}}
function autoLoadLocal(){const raw=localStorage.getItem("vivDashboardState");if(raw){try{applyState(JSON.parse(raw));return}catch(e){console.warn(e)}}calculate()}
function copyReport(){calculate();const report=document.getElementById("report");if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(report.value).then(()=>alert("已复制日报")).catch(()=>fallbackCopy(report))}else fallbackCopy(report)}function fallbackCopy(el){el.focus();el.select();document.execCommand("copy");alert("已复制日报")}
function downloadCsv(){calculate();const rows=[["section","metric","value"]];const add=(s,m,v)=>rows.push([s,m,String(v)]);add("us","net_liq",num("net_liq"));add("us","real_profit",num("net_liq")-num("total_deposit"));add("us","pl_ytd",num("pl_ytd"));add("a_share","total_pnl",num("total_pnl"));add("combined","combined_profit",num("total_pnl")+(num("net_liq")-num("total_deposit"))*num("usd_cny"));getPositions().forEach(p=>{add("position",p.ticker+" quantity",p.quantity);add("position",p.ticker+" current_price",p.current_price)});const csv=rows.map(r=>r.map(x=>`"${String(x).replaceAll('"','""')}"`).join(",")).join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`dashboard-${val("date")||"viv"}.csv`;a.click()}
function resetDefaults(){if(confirm("确定清空本机保存的数据？")){localStorage.removeItem("vivDashboardState");location.reload()}}
document.querySelectorAll("input").forEach(i=>i.addEventListener("input",calculate));
autoLoadLocal();
</script>
</body>
